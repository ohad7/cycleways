# Phase 2.9: native elevation profile chart smoke.
# Builds a route via the shared search/add path, expands the sheet, asserts the
# chart + legend, and scrubs it.
appId: app.cycleways.mobile
---
- launchApp
- assertVisible: "חיפוש מיקום"
- waitForAnimationToEnd:
    timeout: 6000

# Build a deterministic route without relying on the current map camera.
- tapOn: "חיפוש מיקום"
- inputText: "Kfar Blum"
- tapOn: "חיפוש"
- assertVisible: "הוסף"
- tapOn: "הוסף"
- tapOn: "חיפוש מיקום"
- eraseText
- inputText: "HaGoshrim"
- tapOn: "חיפוש"
- assertVisible: "הוסף"
- tapOn: "הוסף"

- tapOn: "הצג גרף גובה"
- assertVisible: "גרף גובה"
- assertVisible: "יציב"
- takeScreenshot: /tmp/maestro-elevation-chart
# Scrub the chart; the tooltip appears and a marker tracks the route on the map.
# The marker persists at the last point after the finger lifts.
- swipe:
    start: "30%,88%"
    end: "75%,88%"
- assertVisible:
    text: "📍 מרחק.*"
- takeScreenshot: /tmp/maestro-elevation-scrub
