# Phase 2.8b parity-realign smoke: the front-panel Discover/Build toggle and the
# native catalog -> planner flow.
# Run: maestro --device <UDID> test .maestro/discover-build-smoke.yaml
# Requires Metro running and the dev-client build installed.
appId: app.cycleways.mobile
---
- assertVisible: "חיפוש מיקום"          # search chrome rendered
- assertVisible: "חפש מסלול"            # Discover toggle tab
- assertVisible: "בניית מסלול"          # Build toggle tab

# --- Switch to Discover and confirm the bundled catalog lists ---
# Route cards are Pressables: the inner title Text collapses into the parent
# a11y node, so target the card's accessibilityLabel (HANDOFF Slice 10 note).
- tapOn: "חפש מסלול"
- assertVisible: "פתח את בניאס וגן הצפון במפה"   # a known catalog route card
- takeScreenshot: /tmp/maestro-2-8b-discover

# --- Select a catalog route: should load it and switch to Build ---
- tapOn: "פתח את בניאס וגן הצפון במפה"
- assertVisible: "מסלול מומלץ"          # Build eyebrow for a catalog route
- assertVisible: "בניאס וגן הצפון"      # catalog route title in Build head
- assertVisible: "נקודות"               # stats grid rendered => route is ready
- takeScreenshot: /tmp/maestro-2-8b-build-loaded

# --- Clear detaches from the catalog entry ---
- tapOn: "איפוס מסלול"
- assertVisible: "המסלול שלי · טיוטה"   # eyebrow falls back to draft
- takeScreenshot: /tmp/maestro-2-8b-after-clear
